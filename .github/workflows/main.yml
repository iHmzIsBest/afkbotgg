name: 7/24 Bot
on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir kontrol eder
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: node index.js
